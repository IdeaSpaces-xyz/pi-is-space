name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck, test, drift guards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install typecheck dependencies
        run: |
          mkdir -p .ci-deps
          SDK_SPEC=$(node -p "require('./package.json').dependencies['@ideaspaces/sdk']")
          # The CLI git dep builds its bundle via `prepare` on install — the
          # conformance e2e executes that bundle, so it must be a real install.
          CLI_SPEC=$(node -p "require('./package.json').dependencies['@ideaspaces/cli']")
          PROTOCOL_SPEC=$(node -p "require('./package.json').devDependencies['@ideaspaces/protocol']")
          npm install --prefix .ci-deps --no-save --no-audit --no-fund \
            typescript@^5.8.3 \
            @types/node@^25.5.2 \
            typebox \
            @earendil-works/pi-ai \
            @earendil-works/pi-coding-agent \
            vitest@^3.2.6 \
            "$SDK_SPEC" \
            "$CLI_SPEC" \
            "$PROTOCOL_SPEC"
          ln -s .ci-deps/node_modules node_modules

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Lint skill entrypoints
        run: npm run lint:skills

      - name: Verify reference catalog is current
        run: |
          npm run build:reference
          git diff --exit-code reference/
