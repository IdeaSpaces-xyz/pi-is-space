name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck, test, drift guards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      # `npm ci` from the committed lockfile replaces the old hand-curated
      # `.ci-deps` install — that list had to be maintained by hand and missed
      # `@ideaspaces/cli` until the conformance suite first executed it (epic
      # conformance finding #4). The lockfile pins everything, including the
      # `*` peer deps, and the CLI git dep still builds its bundle via
      # `prepare` — the conformance e2e executes that bundle.
      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Lint skill entrypoints
        run: npm run lint:skills

      - name: Verify reference catalog is current
        run: |
          npm run build:reference
          git diff --exit-code reference/
